<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Registro TAME</title>
<base target="_top">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f7;--bg3:#f2f1ee;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#9a9a9a;
  --border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);
  --blue-bg:#e6f1fb;--blue:#185fa5;--blue-dk:#0c447c;
  --green-bg:#eaf3de;--green:#3b6d11;
  --amber-bg:#faeeda;--amber:#854f0b;
  --red-bg:#fcebeb;--red:#a32d2d;--red-dk:#791f1f;
  --teal-bg:#e0f5ef;--teal:#0f6e56;
  --purple-bg:#eeedfe;--purple:#534ab7;
  --r:8px;--rl:12px
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1e;--bg2:#252525;--bg3:#2c2c2a;
  --text:#f0ede8;--text2:#a8a8a8;--text3:#6b6b6b;
  --border:rgba(255,255,255,.12);--border2:rgba(255,255,255,.22);
  --blue-bg:#0c2a45;--blue:#5ba3e8;--blue-dk:#85b7eb;
  --green-bg:#172504;--green:#97c459;
  --amber-bg:#291a04;--amber:#ef9f27;
  --red-bg:#2a1010;--red:#f09595;--red-dk:#f7c1c1;
  --teal-bg:#0a2e25;--teal:#3ecba8;
  --purple-bg:#26215c;--purple:#afa9ec
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:12px 12px 80px;display:flex;flex-direction:column;gap:14px}
.hdr{background:var(--bg);border-bottom:.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200}
.hdr-icon{width:32px;height:32px;background:var(--blue);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:700;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;flex:1}
.sync-wrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sync-dot.ok{background:var(--green)}.sync-dot.err{background:var(--red)}
.sync-dot.spin{background:var(--amber);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{display:flex;background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:4px;gap:4px}
.tab{flex:1;padding:9px 6px;font-size:13px;border:none;background:transparent;cursor:pointer;color:var(--text2);border-radius:var(--r);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500;min-height:40px}
.tab.active{background:var(--text);color:var(--bg);font-weight:700}
.card{background:var(--bg);border:.5px solid var(--border);border-radius:var(--rl);padding:16px}
@media(max-width:480px){.card{padding:13px 11px}}
.st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px;padding-bottom:8px;border-bottom:.5px solid var(--border)}
.prog-wrap{display:flex;align-items:center;gap:10px}
.prog-label{font-size:12px;color:var(--text2);white-space:nowrap;min-width:90px}
.pips{display:flex;gap:4px;flex:1}
.pip{height:4px;flex:1;border-radius:2px;background:var(--border2);transition:background .2s}
.pip.done{background:var(--text2)}.pip.active{background:var(--text)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
@media(max-width:500px){.r2{grid-template-columns:1fr}.r3{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:13px;color:var(--text2);font-weight:500}
.req{color:var(--red)}
input,select,textarea{width:100%;border:.5px solid var(--border2);border-radius:var(--r);padding:10px 12px;font-size:15px;color:var(--text);background:var(--bg);outline:none;-webkit-appearance:none;appearance:none;transition:border-color .15s}
input,select{min-height:46px}
textarea{min-height:76px;resize:vertical;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.15)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.g5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px}
@media(max-width:500px){.g4{grid-template-columns:1fr 1fr}.g5{grid-template-columns:1fr 1fr}}
.seg{border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg);font-size:13px;font-weight:500;cursor:pointer;color:var(--text);transition:all .15s;text-align:center;min-height:44px;padding:8px 4px;display:flex;align-items:center;justify-content:center;width:100%;line-height:1.3}
.seg.sel{background:var(--text);color:var(--bg);border-color:var(--text)}
.seg.sel-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
.seg.sel-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.timing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.nrs-grid{display:grid;grid-template-columns:repeat(11,1fr);gap:4px}
@media(max-width:500px){.nrs-grid{grid-template-columns:repeat(6,1fr);gap:5px}}
.nrs-btn{aspect-ratio:1;border:.5px solid var(--border2);border-radius:var(--r);background:var(--bg);font-size:15px;font-weight:700;cursor:pointer;color:var(--text);min-height:44px;display:flex;align-items:center;justify-content:center;width:100%}
.nrs-btn.s0,.nrs-btn.s1,.nrs-btn.s2{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.nrs-btn.s3,.nrs-btn.s4,.nrs-btn.s5{background:var(--amber-bg);border-color:var(--amber);color:var(--amber)}
.nrs-btn.s6,.nrs-btn.s7,.nrs-btn.s8{background:#faece7;border-color:#993c1d;color:#993c1d}
.nrs-btn.s9,.nrs-btn.s10{background:var(--red-bg);border-color:var(--red);color:var(--red)}
.ssv-row{display:flex;align-items:center;gap:12px}
.ssv-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--border2);border-radius:2px;outline:none;border:none;min-height:auto;padding:0}
.ssv-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--blue);cursor:pointer}
.ssv-row input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--blue);cursor:pointer;border:none}
.ssv-num{font-size:24px;font-weight:700;min-width:50px;text-align:right;color:var(--blue)}
.score-bar{display:flex;align-items:center;gap:14px;padding:13px;background:var(--bg2);border-radius:var(--r);margin-top:10px;border:.5px solid var(--border)}
.score-big{font-size:28px;font-weight:700;line-height:1}
.score-max{font-size:15px;color:var(--text2);font-weight:400}
.score-label{font-size:14px;font-weight:600}
.score-sub{font-size:12px;color:var(--text3);margin-top:2px}
.domains{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-top:10px}
.d-card{background:var(--bg2);border-radius:var(--r);padding:10px 12px;border:.5px solid var(--border)}
.d-name{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.d-val{font-size:22px;font-weight:700;margin-top:3px}
.d-card.hi .d-val{color:var(--blue)}
.q-block{border:.5px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.q-head{padding:11px 13px;background:var(--bg2);font-size:13px;font-weight:500;display:flex;align-items:flex-start;gap:9px;line-height:1.45;border-bottom:.5px solid var(--border)}
.q-num{background:var(--bg);border:.5px solid var(--border2);border-radius:50%;width:22px;height:22px;min-width:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);margin-top:1px}
.q-opts{display:flex;flex-direction:column}
.q-opt{display:flex;align-items:center;gap:11px;padding:12px 13px;border-top:.5px solid var(--border);cursor:pointer;font-size:13px;line-height:1.35;user-select:none;-webkit-tap-highlight-color:transparent}
.q-opt:hover{background:var(--bg2)}
.q-opt.sel{background:var(--blue-bg);color:var(--blue-dk)}
.rdot{width:18px;height:18px;min-width:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;background:var(--bg)}
.q-opt.sel .rdot{border-color:var(--blue);background:var(--blue)}
.rdot-i{width:7px;height:7px;border-radius:50%;background:white;display:none}
.q-opt.sel .rdot-i{display:block}
.step-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:16px;padding-top:14px;border-top:.5px solid var(--border)}
.btn{padding:11px 18px;border-radius:var(--r);border:.5px solid var(--border2);background:var(--bg);cursor:pointer;font-size:14px;color:var(--text);transition:all .15s;display:inline-flex;align-items:center;gap:6px;min-height:46px;white-space:nowrap;font-weight:500}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}.btn-primary:hover{opacity:.85;background:var(--text)}
.btn-ghost{border-color:transparent;padding-left:6px}.btn-ghost:hover{background:var(--bg2)}
.btn-sm{padding:7px 12px;font-size:12px;min-height:36px}
.btn-xs{padding:5px 9px;font-size:11px;min-height:28px;gap:4px}
.btn-danger{color:var(--red);border-color:rgba(163,45,45,.25)}.btn-danger:hover{background:var(--red-bg)}
.btn-success{background:#27500a;color:#fff;border-color:#27500a}.btn-success:hover{opacity:.88}
.btn-amber{background:var(--amber);color:#fff;border-color:var(--amber)}.btn-amber:hover{opacity:.88}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}.btn-purple:hover{opacity:.88}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}.btn-teal:hover{opacity:.88}
.alert{padding:11px 13px;border-radius:var(--r);font-size:13px;margin-top:10px;display:flex;gap:8px;align-items:flex-start;line-height:1.4}
.alert-err{background:var(--red-bg);color:var(--red-dk);border:.5px solid rgba(163,45,45,.2)}
.alert-ok{background:var(--green-bg);color:var(--green);border:.5px solid rgba(59,109,17,.2)}
.alert-info{background:var(--blue-bg);color:var(--blue-dk);border:.5px solid rgba(24,95,165,.2)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.b-blue{background:var(--blue-bg);color:var(--blue-dk)}.b-green{background:var(--green-bg);color:var(--green)}
.b-amber{background:var(--amber-bg);color:var(--amber)}.b-gray{background:var(--bg2);color:var(--text2)}
.b-purple{background:var(--purple-bg);color:var(--purple)}.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-red{background:var(--red-bg);color:var(--red)}
.p-row{display:flex;align-items:center;gap:12px;padding:12px;border:.5px solid var(--border);border-radius:var(--r);margin-bottom:7px;background:var(--bg);cursor:pointer}
.p-row:hover{background:var(--bg2)}
.avatar{width:40px;height:40px;min-width:40px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--blue-dk)}
.avatar.proc{background:var(--teal-bg);color:var(--teal)}
.p-info{flex:1;min-width:0}
.p-name{font-size:14px;font-weight:600}
.p-meta{font-size:12px;color:var(--text2);margin-top:3px;display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.p-scores{font-size:12px;color:var(--text3);margin-top:2px}
.search-bar{margin-bottom:10px}
.search-bar input{min-height:40px;font-size:13px}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.f-btn{padding:6px 13px;border-radius:99px;border:.5px solid var(--border2);background:var(--bg);font-size:12px;cursor:pointer;color:var(--text2);min-height:32px;font-weight:500}
.f-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.rh{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:14px;border:.5px solid var(--border)}
.rr{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:.5px solid var(--border);gap:10px}
.rr:last-child{border-bottom:none}
.rk{font-size:13px;color:var(--text2);flex-shrink:0}
.rv{font-size:14px;font-weight:600;text-align:right}
.rs{font-size:11px;color:var(--text3);margin-top:1px;text-align:right}
.wsec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin:14px 0 8px;padding:8px 0;border-bottom:.5px solid var(--border)}
.recall-box{background:var(--blue-bg);border:.5px solid rgba(24,95,165,.3);border-radius:var(--r);padding:14px;margin-bottom:14px}
.recall-box .st{color:var(--blue-dk);border-color:rgba(24,95,165,.2)}
.edit-banner{background:var(--amber-bg);border:.5px solid var(--amber);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;font-size:13px;color:var(--amber);font-weight:500}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-start;justify-content:center;padding:20px 12px;overflow-y:auto}
.modal{background:var(--bg);border-radius:var(--rl);width:100%;max-width:680px;overflow:hidden;margin:auto}
.modal-hdr{padding:16px 20px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.modal-hdr h2{font-size:16px;font-weight:700}
.modal-body{padding:20px}
.chart-wrap{position:relative;width:100%;height:240px;margin-top:10px}
.list-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;justify-content:space-between}
.toolbar-right{display:flex;gap:6px;flex-wrap:wrap}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text2);font-size:14px;line-height:1.7}
.hidden{display:none!important}
.tt{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:16px;overflow-x:auto;display:block}
.tt th{text-align:left;padding:6px 8px;font-weight:700;color:var(--text2);border-bottom:.5px solid var(--border);white-space:nowrap}
.tt td{padding:6px 8px;border-bottom:.5px solid var(--border)}
.td-r{text-align:right;font-weight:500}
.td-pos{text-align:right;font-weight:700;color:var(--green)}
.td-neg{text-align:right;font-weight:700;color:var(--red)}
.timing-badge-proc{background:var(--teal-bg);color:var(--teal);border:.5px solid var(--teal)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">T</div>
  <div class="hdr-title">Registro TAME</div>
  <div class="sync-wrap">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-txt">connessione...</span>
  </div>
</div>

<div class="app">
  <div class="tabs" id="tabs-bar"></div>

  <div id="tab-form">
    <div class="card" style="padding:12px 16px">
      <div class="prog-wrap">
        <span class="prog-label" id="step-label"></span>
        <div class="pips" id="pips"></div>
      </div>
    </div>
    <div id="edit-banner-wrap"></div>
    <div class="card" id="form-card"></div>
    <div id="alert-area"></div>
  </div>

  <div id="tab-list" class="hidden">
    <div class="card">
      <div class="list-toolbar">
        <span style="font-size:16px;font-weight:700">Archivio pazienti</span>
        <div class="toolbar-right" id="list-actions"></div>
      </div>
      <div class="search-bar">
        <input type="search" id="search-input" placeholder="Cerca per cognome o nome...">
      </div>
      <div class="filter-bar" id="filter-bar"></div>
      <div id="patient-list"></div>
    </div>
  </div>

  <div id="tab-trend" class="hidden">
    <div class="card">
      <div class="st">Confronto temporale per paziente</div>
      <div class="field" style="margin-bottom:14px">
        <label>Seleziona paziente</label>
        <select id="trend-sel"></select>
      </div>
      <div id="trend-content">
        <div class="empty" style="padding:1.5rem 0;font-size:13px">Seleziona un paziente</div>
      </div>
    </div>
  </div>
</div>

<div class="overlay hidden" id="detail-overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="detail-title">Scheda paziente</h2>
      <div style="display:flex;gap:8px" id="detail-hdr-btns"></div>
    </div>
    <div class="modal-body" id="detail-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// ── CONFIG ────────────────────────────────────────────────
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyvnFXcNb9WgXsZFUB4EHpn0cM3xxeZurKBKjYhdyMQ1gwoEatnM4XZmLmfEIB9JEGidA/exec';

// ── DATI CLINICI ──────────────────────────────────────────
var QUESTIONARI = {Spalla:['SSV','OSS','QuickDASH'],Gomito:['OES','QuickDASH'],Mano:['QuickDASH'],Anca:['WOMAC'],Ginocchio:['KOOS'],Piede:[]};
var LATI = ['Destro','Sinistro','Bilaterale','N/A'];

};

var TIMINGS_VALUTAZIONE = ['Pre-procedura','1 mese','3 mesi','6 mesi','12 mesi'];
var TIMING_ORDER = ['Pre-procedura','Procedura','1 mese','3 mesi','6 mesi','12 mesi'];

function mk(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}

function today(){return new Date().toISOString().split('T')[0];}

function setSS(state,text){$id('sync-dot').className='sync-dot '+state;$id('sync-txt').textContent=text;}

// ── google.script.run ──────────────────────────────────────
function gsRead(){return new Promise(function(res,rej){google.script.run.withSuccessHandler(res).withFailureHandler(rej).serverRead();});}
function gsWrite(rec){return new Promise(function(res,rej){google.script.run.withSuccessHandler(res).withFailureHandler(rej).serverWrite(rec);});}
function gsUpdate(rec){return new Promise(function(res,rej){google.script.run.withSuccessHandler(res).withFailureHandler(rej).serverUpdate(rec);});}
function gsDelete(id){return new Promise(function(res,rej){google.script.run.withSuccessHandler(res).withFailureHandler(rej).serverDelete(id);});}

function normalizeRecord(r){
  var nums=['nrs','ssv','oss','quickdash','oes_total','oes_func','oes_pain','oes_soc','womac_D','womac_R','womac_F','womac_tot','womac_pct','koos_sym','koos_pain','koos_adl','koos_sport','koos_qol','koos_total','proc_arterie','proc_volume_ml','proc_durata_min','proc_kl'];
  var out=Object.assign({},r);
  nums.forEach(function(k){if(out[k]!==''&&out[k]!==null&&out[k]!==undefined)out[k]=Number(out[k]);});
  return out;
}

async function loadFromSheet(){
  setSS('spin','caricamento...');
  try{
    var res=await gsRead();
    if(res&&res.status==='ok'){
      allPatients=res.data.map(normalizeRecord);
      setSS('ok',allPatients.length+' record');
      updateCnt(allPatients.length);
    } else throw new Error(res?res.data:'errore');
  }catch(e){setSS('err','errore connessione');console.error('loadFromSheet error:',e);}
}

  var bar=$id('tabs-bar');
  [['form','Nuovo'],['list','Archivio'],['trend','Trend']].forEach(function(pair){

    btn.addEventListener('click',function(){showTab(pair[0]);});

function showTab(t){
  currentTab=t;
  ['form','list','trend'].forEach(function(n){$id('tab-'+n).classList.toggle('hidden',n!==t);});
  $id('tabs-bar').querySelectorAll('.tab').forEach(function(btn,i){btn.classList.toggle('active',['form','list','trend'][i]===t);});
  if(t==='list')loadFromSheet().then(function(){renderList();});
  if(t==='trend')loadFromSheet().then(function(){populateTrendSelect();});
}

// ── STEPS ──────────────────────────────────────────────────
// La logica dei step dipende dal timing selezionato:
// - Procedura: Anagrafica → Distretto → Dati Procedura → Riepilogo
// - Pre-procedura / Follow-up: Anagrafica → Distretto → NRS → [Questionari] → Riepilogo
function getSteps(){
  if(isProcedura()){
    return ['Anagrafica','Distretto & timing','Procedura','Riepilogo'];
  }
  var q=ST.data.sede?QUESTIONARI[ST.data.sede]:[];
  return ['Anagrafica','Distretto & timing','NRS'].concat(q).concat(['Riepilogo']);
}

function renderPips(){
  var steps=getSteps(),s=ST.step;
  $id('step-label').textContent=(s+1)+'/'+steps.length+' - '+steps[s];
  var c=$id('pips');c.innerHTML='';
  steps.forEach(function(_,i){c.appendChild(mk('div','pip'+(i===s?' active':i<s?' done':'')));});
}

// ── Q-BLOCK ────────────────────────────────────────────────
function buildQBlock(prefix,idx,question,opts){
  var key=prefix+'_'+idx,cur=ST.answers[key];
  var block=mk('div','q-block');block.dataset.key=key;
  var head=mk('div','q-head');
  head.appendChild(mk('span','q-num',String(idx+1)));
  head.appendChild(mk('span','',question));
  block.appendChild(head);
  var optsDiv=mk('div','q-opts');
  opts.forEach(function(o,j){
    var opt=mk('div','q-opt'+(cur===j?' sel':''));
    var rdot=mk('div','rdot');rdot.appendChild(mk('div','rdot-i'));
    opt.appendChild(rdot);opt.appendChild(mk('span','',o));
    opt.addEventListener('click',function(){
      ST.answers[key]=j;
      optsDiv.querySelectorAll('.q-opt').forEach(function(el,k){el.classList.toggle('sel',k===j);});
      refreshLiveScore();
    });
    optsDiv.appendChild(opt);
  });
  block.appendChild(optsDiv);
  return block;
}

function refreshLiveScore(){
  var sn=getSteps()[ST.step],live=document.querySelector('.score-live');
  if(!live)return;live.innerHTML='';
  if(sn==='OSS'){var sc=calcOSS();if(sc!==null)live.appendChild(buildScoreBar(sc,48,'OSS Totale','piu\' alto = migliore'));}
  if(sn==='QuickDASH'){var sc2=calcQD();if(sc2!==null)live.appendChild(buildScoreBar(sc2.toFixed(1),100,'QuickDASH','piu\' basso = migliore'));}
  if(sn==='OES'){var d=calcOESD();if(d)live.appendChild(buildDomains([{n:'Funzione',v:d.f},{n:'Dolore',v:d.p},{n:'Soc.',v:d.s},{n:'Totale',v:(d.f+d.p+d.s)/3,hi:true}]));}
  if(sn==='WOMAC'){var sc3=calcWO();if(sc3)live.appendChild(buildDomains([{n:'Dolore',v:sc3.D},{n:'Rigidita\'',v:sc3.R},{n:'Funzione',v:sc3.F},{n:'Tot %',v:sc3.pct,suffix:'%',hi:true}]));}
  if(sn==='KOOS'){var sc4=calcKO();if(sc4)live.appendChild(buildDomains([{n:'Symptoms',v:sc4.sym},{n:'Pain',v:sc4.pain},{n:'ADL',v:sc4.adl},{n:'Sport',v:sc4.sport},{n:'QOL',v:sc4.qol},{n:'Media',v:sc4.total,hi:true}]));}
}

function buildScoreBar(val,max,label,sub){
  var bar=mk('div','score-bar');
  var big=mk('div','score-big',String(val));big.appendChild(mk('span','score-max','/'+max));
  var info=mk('div','');info.style.flex='1';
  info.appendChild(mk('div','score-label',label));info.appendChild(mk('div','score-sub',sub));
  bar.appendChild(big);bar.appendChild(info);return bar;
}
function buildDomains(items){
  var wrap=mk('div','domains');
  items.forEach(function(d){
    var card=mk('div','d-card'+(d.hi?' hi':''));
    card.appendChild(mk('div','d-name',d.n));
    card.appendChild(mk('div','d-val',(typeof d.v==='number'?d.v.toFixed(1):d.v)+(d.suffix||'')));
    wrap.appendChild(card);
  });
  return wrap;
}

// ── RENDER STEP ────────────────────────────────────────────
function renderStep(){
  renderPips();
  var sn=getSteps()[ST.step];
  var card=$id('form-card');card.innerHTML='';
  var bw=$id('edit-banner-wrap');bw.innerHTML='';
  if(ST.editingId)bw.appendChild(mk('div','edit-banner','Stai modificando un record esistente.'));
  card.appendChild(buildStepContent(sn));
  // Nav
  var nav=mk('div','step-nav');
  var back=mk('button','btn btn-ghost','< Indietro');
  if(ST.step===0)back.style.visibility='hidden';
  back.addEventListener('click',function(){goStep(ST.step-1);});
  nav.appendChild(back);
  var steps=getSteps();
  if(ST.step===steps.length-1){
    var sub=mk('button','btn btn-success',ST.editingId?'Aggiorna':'Archivia');
    sub.id='submit-btn';
    sub.addEventListener('click',submitForm);
    nav.appendChild(sub);
  } else {
    var nxt=mk('button','btn btn-primary','Avanti >');
    nxt.addEventListener('click',function(){goStep(ST.step+1);});
    nav.appendChild(nxt);
  }
  card.appendChild(nav);
}

    // Richiamo paziente esistente
    var nameMap={};
    allPatients.forEach(function(p){
      var k=(p.cognome||'')+' '+(p.nome||'');k=k.trim();
      if(k&&!nameMap[k])nameMap[k]={cognome:p.cognome,nome:p.nome,sesso:p.sesso,dob:p.dob};
    });
    var names=Object.keys(nameMap).sort();

        ST.data.cognome=p.cognome||'';ST.data.nome=p.nome||'';ST.data.sesso=p.sesso||'';ST.data.dob=p.dob||'';

// ── Field helpers ──────────────────────────────────────────
function buildField(label,id,type,value,placeholder,required){
  var f=mk('div','field');
  if(label){var lbl=mk('label','',label);if(required)lbl.appendChild(mk('span','req',' *'));f.appendChild(lbl);}
  var inp=document.createElement('input');inp.type=type;inp.id=id;inp.value=value;if(placeholder)inp.placeholder=placeholder;
  f.appendChild(inp);return f;
}
function buildNumField(label,id,value,placeholder){
  var f=mk('div','field');
  if(label)f.appendChild(mk('label','',label));
  var inp=document.createElement('input');inp.type='number';inp.id=id;inp.value=value!==undefined&&value!==''?value:'';inp.placeholder=placeholder||'';inp.step='any';inp.min='0';
  f.appendChild(inp);return f;
}
function buildSelectField(label,id,values,labels,selected,required){
  var f=mk('div','field');
  if(label){var lbl=mk('label','',label);if(required)lbl.appendChild(mk('span','req',' *'));f.appendChild(lbl);}
  var sel=document.createElement('select');sel.id=id;
  values.forEach(function(v,i){var opt=document.createElement('option');opt.value=v;opt.textContent=labels[i];if(v===selected)opt.selected=true;sel.appendChild(opt);});
  f.appendChild(sel);return f;
}

// ── VALIDATE ───────────────────────────────────────────────
function validate(){
  var sn=getSteps()[ST.step];
  if(sn==='Anagrafica'){
    var cog=(($id('f-cog')||{}).value||'').trim(),nom=(($id('f-nom')||{}).value||'').trim(),ses=($id('f-ses')||{}).value||'';
    if(!cog||!nom||!ses){showAlert('Cognome, nome e sesso sono obbligatori.');return false;}
    ST.data.cognome=cog;ST.data.nome=nom;ST.data.sesso=ses;
    ST.data.dob=($id('f-dob')||{}).value||'';ST.data.dateval=($id('f-dat')||{}).value||'';
    return true;
  }
  if(sn==='Distretto & timing'){
    ST.data.patologia=($id('f-pat')||{}).value||'';
    if(!ST.data.sede){showAlert('Seleziona un distretto.');return false;}
    if(!ST.data.lato){showAlert('Seleziona il lato.');return false;}
    if(!ST.data.timing){showAlert('Seleziona il timing.');return false;}
    return true;
  }
  if(sn==='Procedura'){
    var dp=$id('p-datproc');if(dp)ST.proc.data_procedura=dp.value||'';
    var art=$id('p-arterie');if(art&&art.value!=='')ST.proc.arterie=parseFloat(art.value);
    var vol=$id('p-volume');if(vol&&vol.value!=='')ST.proc.volume_ml=parseFloat(vol.value);
    var dur=$id('p-durata');if(dur&&dur.value!=='')ST.proc.durata_min=parseFloat(dur.value);
    var ds=$id('p-diagspec');if(ds)ST.proc.diagnosi_specifica=ds.value||'';
    var pr=$id('p-pregresso');if(pr)ST.proc.pregresso_intervento=pr.value||'';
    var nt=$id('p-note');if(nt)ST.proc.note=nt.value||'';
    if(!ST.proc.accesso){showAlert('Seleziona l\'accesso vascolare.');return false;}
    if(!ST.proc.successo){showAlert('Indica il successo tecnico.');return false;}
    return true;
  }
  if(sn==='NRS'&&ST.data.nrs===undefined){showAlert('Seleziona il punteggio NRS.');return false;}
  if(sn==='SSV'){var sv=$id('ssv-r');if(sv)ST.data.ssv=parseInt(sv.value);return true;}
  if(sn==='OSS'&&calcOSS()===null){showAlert('Compila tutte le 12 domande OSS.');return false;}
  if(sn==='OES'&&calcOES()===null){showAlert('Compila tutte le 12 domande OES.');return false;}
  if(sn==='QuickDASH'&&calcQD()===null){showAlert('Rispondi ad almeno 10 delle 11 domande.');return false;}
  if(sn==='WOMAC'&&!calcWO()){showAlert('Compila tutte le 24 domande WOMAC.');return false;}
  if(sn==='KOOS'&&!calcKO()){showAlert('Compila tutte le 42 domande KOOS.');return false;}
  return true;
}

function goStep(n){
  var steps=getSteps();
  if(n<0||n>=steps.length)return;
  if(n>ST.step&&!validate())return;
  ST.step=n;renderStep();
  $id('form-card').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── CALCOLI ────────────────────────────────────────────────
function calcOSS(){var vs=[];for(var i=0;i<12;i++)vs.push(ST.answers['oss_'+i]);return vs.some(function(v){return v===undefined;})?null:vs.reduce(function(a,b){return a+b;},0);}
function calcOESD(){var g=function(idxs){var vs=idxs.map(function(i){return ST.answers['oes_'+i];});return vs.some(function(v){return v===undefined;})?null:vs.reduce(function(a,b){return a+b;},0)/16*100;};var f=g([0,1,2,3]),p=g([6,7,10,11]),s=g([4,5,8,9]);return f===null||p===null||s===null?null:{f:f,p:p,s:s};}
function calcOES(){var d=calcOESD();return d?(d.f+d.p+d.s)/3:null;}
function calcQD(){var vs=[];for(var i=0;i<11;i++)vs.push(ST.answers['qd_'+i]);var vl=vs.filter(function(v){return v!==undefined;});return vl.length<10?null:(vl.reduce(function(a,b){return a+(b+1);},0)/vl.length-1)*25;}
function calcWO(){var D=[],R=[],F=[];for(var i=0;i<5;i++)D.push(ST.answers['woD_'+i]);for(var i=0;i<2;i++)R.push(ST.answers['woR_'+i]);for(var i=0;i<17;i++)F.push(ST.answers['woF_'+i]);if(D.concat(R).concat(F).some(function(v){return v===undefined;}))return null;var ds=D.reduce(function(a,b){return a+b;},0),rs=R.reduce(function(a,b){return a+b;},0),fs=F.reduce(function(a,b){return a+b;},0);return{D:ds,R:rs,F:fs,tot:ds+rs+fs,pct:(ds+rs+fs)/96*100};}
function calcKO(){var avg=function(pre,n){var v=[];for(var i=0;i<n;i++){if(ST.answers[pre+i]!==undefined)v.push(ST.answers[pre+i]);}return v.length<Math.ceil(n/2)?null:v.reduce(function(a,b){return a+b;},0)/v.length;};var S=avg('koS_',7),P=avg('koP_',9),A=avg('koA_',17),SP=avg('koSP_',5),Q=avg('koQ_',4);if([S,P,A,SP,Q].some(function(v){return v===null;}))return null;var sc=function(v){return Math.round((100-v*100/4)*10)/10;};var sym=sc(S),pain=sc(P),adl=sc(A),sport=sc(SP),qol=sc(Q);return{sym:sym,pain:pain,adl:adl,sport:sport,qol:qol,total:Math.round((sym+pain+adl+sport+qol)/5*10)/10};}

// ── SUBMIT ─────────────────────────────────────────────────
async function submitForm(){
  var d=ST.data,p=ST.proc,q=QUESTIONARI[d.sede]||[];
  var dm=calcOESD(),wo=calcWO(),ko=calcKO(),qd=calcQD();
  var isProc=isProcedura();
  var rec={
    id:ST.editingId||('P'+Date.now()),
    cognome:d.cognome,nome:d.nome,sesso:d.sesso,dob:d.dob,
    dateval:isProc?(p.data_procedura||d.dateval||today()):d.dateval,
    sede:d.sede,lato:d.lato||'',patologia:d.patologia||'',timing:d.timing,
    // NRS e scores — vuoti se procedura
    nrs:isProc?'':d.nrs,
    ssv:(!isProc&&q.indexOf('SSV')>=0&&d.ssv!==undefined)?d.ssv:'',
    oss:(!isProc&&q.indexOf('OSS')>=0&&calcOSS()!==null)?calcOSS():'',
    quickdash:(!isProc&&q.indexOf('QuickDASH')>=0&&qd!==null)?parseFloat(qd.toFixed(2)):'',
    oes_total:(!isProc&&q.indexOf('OES')>=0&&dm)?parseFloat(((dm.f+dm.p+dm.s)/3).toFixed(2)):'',
    oes_func:(!isProc&&q.indexOf('OES')>=0&&dm)?parseFloat(dm.f.toFixed(2)):'',
    oes_pain:(!isProc&&q.indexOf('OES')>=0&&dm)?parseFloat(dm.p.toFixed(2)):'',
    oes_soc:(!isProc&&q.indexOf('OES')>=0&&dm)?parseFloat(dm.s.toFixed(2)):'',
    womac_D:(!isProc&&q.indexOf('WOMAC')>=0&&wo)?wo.D:'',womac_R:(!isProc&&q.indexOf('WOMAC')>=0&&wo)?wo.R:'',
    womac_F:(!isProc&&q.indexOf('WOMAC')>=0&&wo)?wo.F:'',womac_tot:(!isProc&&q.indexOf('WOMAC')>=0&&wo)?wo.tot:'',
    womac_pct:(!isProc&&q.indexOf('WOMAC')>=0&&wo)?parseFloat(wo.pct.toFixed(2)):'',
    koos_sym:(!isProc&&q.indexOf('KOOS')>=0&&ko)?ko.sym:'',koos_pain:(!isProc&&q.indexOf('KOOS')>=0&&ko)?ko.pain:'',
    koos_adl:(!isProc&&q.indexOf('KOOS')>=0&&ko)?ko.adl:'',koos_sport:(!isProc&&q.indexOf('KOOS')>=0&&ko)?ko.sport:'',
    koos_qol:(!isProc&&q.indexOf('KOOS')>=0&&ko)?ko.qol:'',koos_total:(!isProc&&q.indexOf('KOOS')>=0&&ko)?ko.total:'',
    // Procedura — vuoti se non procedura
    data_procedura:isProc?(p.data_procedura||''):'',
    proc_accesso:isProc?(p.accesso||''):'',proc_arterie:isProc&&p.arterie!==undefined?p.arterie:'',
    proc_volume_ml:isProc&&p.volume_ml!==undefined?p.volume_ml:'',proc_durata_min:isProc&&p.durata_min!==undefined?p.durata_min:'',
    proc_successo:isProc?(p.successo||''):'',proc_complicanze:isProc?(p.complicanze||'Nessuna'):'',
    proc_note:isProc?(p.note||''):'',proc_kl:isProc&&p.kl!==undefined?p.kl:'',
    proc_pregresso_intervento:isProc?(p.pregresso_intervento||''):'',
    proc_fibromialgia:isProc?(p.fibromialgia||''):'',proc_diagnosi_specifica:isProc?(p.diagnosi_specifica||''):''
  };

  var btn=$id('submit-btn');
  if(btn){btn.disabled=true;btn.textContent='Salvataggio...';}
  setSS('spin','salvataggio...');

  try{
    var isEdit=!!ST.editingId;
    if(isEdit){await gsUpdate(rec);var idx=-1;for(var i=0;i<allPatients.length;i++){if(allPatients[i].id===rec.id){idx=i;break;}}if(idx>=0)allPatients[idx]=normalizeRecord(rec);else allPatients.push(normalizeRecord(rec));}
    else{await gsWrite(rec);allPatients.push(normalizeRecord(rec));}
    updateCnt(allPatients.length);
    ST={step:0,data:{},proc:{},answers:{},editingId:null};
    $id('edit-banner-wrap').innerHTML='';
    renderStep();
    setSS('ok',allPatients.length+' record');
    showAlert(rec.cognome+' '+rec.nome+(isEdit?' aggiornato':' archiviato')+' — '+rec.timing,'ok');
  }catch(e){
    setSS('err','errore');showAlert('Errore: '+(e.message||e));
    if(btn){btn.disabled=false;btn.textContent=ST.editingId?'Aggiorna':'Archivia';}
  }
}

function renderList(){
  var q=(($id('search-input')||{}).value||'').toLowerCase().trim();
  var sedi=['Tutti','Spalla','Gomito','Mano','Anca','Ginocchio','Piede'];
  var fb=$id('filter-bar');fb.innerHTML='';
  sedi.forEach(function(s){
    var btn=mk('button','f-btn'+(filterSede===s?' active':''),s);
    btn.addEventListener('click',function(){filterSede=s;renderList();});fb.appendChild(btn);
  });
  var filtered=filterSede==='Tutti'?allPatients:allPatients.filter(function(p){return p.sede===filterSede;});
  if(q)filtered=filtered.filter(function(p){return((p.cognome||'')+' '+(p.nome||'')).toLowerCase().indexOf(q)>=0;});
  // Ordina: per paziente poi per timing
  filtered=filtered.slice().sort(function(a,b){
    var na=(a.cognome+a.nome).localeCompare(b.cognome+b.nome);
    if(na!==0)return na;
    return TIMING_ORDER.indexOf(a.timing)-TIMING_ORDER.indexOf(b.timing);
  });
  var pl=$id('patient-list');pl.innerHTML='';
  if(!filtered.length){pl.appendChild(mk('div','empty','Nessun record trovato'));return;}

  // Raggruppa per paziente visivamente
  var lastPat='';
  filtered.forEach(function(p){
    var patKey=(p.cognome||'')+' '+(p.nome||'');
    var isProc=p.timing==='Procedura';
    var row=mk('div','p-row');
    var initLetter=((p.cognome||'?')[0]).toUpperCase();
    var av=mk('div',isProc?'avatar proc':'avatar',isProc?'P':initLetter);
    var info=mk('div','p-info');
    // Nome solo se cambio paziente
    if(patKey!==lastPat){
      info.appendChild(mk('div','p-name',patKey));lastPat=patKey;
    }
    var meta=mk('div','p-meta');
    meta.appendChild(document.createTextNode((p.dateval||'-')+'  '));
    meta.appendChild(mk('span','badge '+(SBADGE[p.sede]||'b-gray'),p.sede));
    if(p.lato)meta.appendChild(mk('span','badge b-purple',p.lato));
    // Timing badge
    var timingCls=isProc?'b-teal':'b-gray';
    meta.appendChild(mk('span','badge '+timingCls,p.timing||'-'));
    info.appendChild(meta);
    // Scores / proc data
    var tags=[];
    if(isProc){
      if(p.proc_accesso)tags.push('Acc. '+p.proc_accesso);
      if(p.proc_arterie!==''&&p.proc_arterie!==undefined&&p.proc_arterie!==null)tags.push(p.proc_arterie+' art.');
      if(p.proc_volume_ml!==''&&p.proc_volume_ml!==undefined&&p.proc_volume_ml!==null)tags.push(p.proc_volume_ml+' ml');
      if(p.proc_successo)tags.push('Succ.: '+p.proc_successo);
    } else {
      if(p.nrs!==''&&p.nrs!==undefined&&p.nrs!==null)tags.push('NRS '+p.nrs);
      if(p.ssv!==''&&p.ssv!==undefined&&p.ssv!==null)tags.push('SSV '+p.ssv);
      if(p.oss!==''&&p.oss!==undefined&&p.oss!==null)tags.push('OSS '+p.oss+'/48');
      if(p.quickdash!==''&&p.quickdash!==undefined&&p.quickdash!==null)tags.push('QD '+p.quickdash);
      if(p.oes_total!==''&&p.oes_total!==undefined&&p.oes_total!==null)tags.push('OES '+p.oes_total);
      if(p.womac_pct!==''&&p.womac_pct!==undefined&&p.womac_pct!==null)tags.push('WOMAC '+p.womac_pct+'%');
      if(p.koos_total!==''&&p.koos_total!==undefined&&p.koos_total!==null)tags.push('KOOS '+p.koos_total);
    }
    if(tags.length)info.appendChild(mk('div','p-scores',tags.join(' · ')));
    var actions=mk('div','');actions.style.display='flex';actions.style.gap='4px';
    var editBtn=mk('button','btn btn-xs btn-amber','Modifica');
    var delBtn=mk('button','btn btn-xs btn-danger','X');
    (function(pid){
      editBtn.addEventListener('click',function(e){e.stopPropagation();startEdit(pid);});
      delBtn.addEventListener('click',function(e){e.stopPropagation();delPt(pid);});
      row.addEventListener('click',function(){openDetail(pid);});
    })(p.id);
    actions.appendChild(editBtn);actions.appendChild(delBtn);
    row.appendChild(av);row.appendChild(info);row.appendChild(actions);
    pl.appendChild(row);
  });
}

function startEdit(id){
  var p=null;for(var i=0;i<allPatients.length;i++){if(allPatients[i].id===id){p=allPatients[i];break;}}if(!p)return;
  ST.editingId=p.id;
  ST.data={cognome:p.cognome||'',nome:p.nome||'',sesso:p.sesso||'',dob:p.dob||'',dateval:p.dateval||today(),sede:p.sede||'',lato:p.lato||'',patologia:p.patologia||'',timing:p.timing||'',nrs:p.nrs!==''&&p.nrs!==undefined?Number(p.nrs):undefined,ssv:p.ssv!==''&&p.ssv!==undefined?Number(p.ssv):undefined};
  ST.proc={data_procedura:p.data_procedura||'',accesso:p.proc_accesso||'',arterie:p.proc_arterie!==''?Number(p.proc_arterie):undefined,volume_ml:p.proc_volume_ml!==''?Number(p.proc_volume_ml):undefined,durata_min:p.proc_durata_min!==''?Number(p.proc_durata_min):undefined,successo:p.proc_successo||'',complicanze:p.proc_complicanze||'',note:p.proc_note||'',kl:p.proc_kl!==''&&p.proc_kl!==undefined?Number(p.proc_kl):undefined,pregresso_intervento:p.proc_pregresso_intervento||'',fibromialgia:p.proc_fibromialgia||'',diagnosi_specifica:p.proc_diagnosi_specifica||''};
  ST.answers={};ST.step=0;

}

async function delPt(id){
  if(!confirm('Eliminare questo record?'))return;
  setSS('spin','eliminazione...');
  try{
    await gsDelete(id);
    allPatients=allPatients.filter(function(p){return p.id!==id;});
    updateCnt(allPatients.length);setSS('ok',allPatients.length+' record');renderList();
  }catch(e){setSS('err','errore');showAlert('Errore eliminazione.');}
}

function populateTrendSelect(){
  var sel=$id('trend-sel'),cur=sel.value;
  var map={};
  allPatients.forEach(function(p){
    if(p.timing==='Procedura')return; // escludi record procedura dal trend
    var key=(p.cognome||'')+' '+(p.nome||'')+'|'+p.sede;
    if(!map[key])map[key]={label:(p.cognome||'')+' '+(p.nome||'')+' ('+p.sede+')',key:key};
  });
  sel.innerHTML='';var def=document.createElement('option');def.value='';def.textContent='— seleziona —';sel.appendChild(def);
  Object.values(map).forEach(function(m){var o=document.createElement('option');o.value=m.key;o.textContent=m.label;if(m.key===cur)o.selected=true;sel.appendChild(o);});
  if(!sel._ev){sel.addEventListener('change',renderTrend);sel._ev=true;}
  if(cur)renderTrend();
}

function renderTrend(){
  var val=$id('trend-sel').value,cont=$id('trend-content');
  if(!val){cont.innerHTML='';return;}
  var parts=val.split('|'),patname=parts[0],sede=parts[1];
  var nameParts=patname.trim().split(' ');
  var records=allPatients.filter(function(p){
    return p.timing!=='Procedura'&&((p.cognome||'')+' '+(p.nome||'')).trim()===patname&&p.sede===sede;
  });
  records.sort(function(a,b){return TIMING_ORDER.indexOf(a.timing)-TIMING_ORDER.indexOf(b.timing);});
  if(!records.length){cont.innerHTML='<div class="empty">Nessuna valutazione trovata</div>';return;}
  var timings=records.map(function(r){return r.timing;}),q=QUESTIONARI[sede]||[];
  var series=[];
  function addS(l,d,c,inv){series.push({label:l,data:d,color:c,inverted:!!inv});}
  if(records.some(function(r){return r.nrs!==''&&r.nrs!==undefined;}))addS('NRS (0-10)',records.map(function(r){return r.nrs!==''&&r.nrs!==undefined?Number(r.nrs):null;}),'#e24b4a',true);
  if(q.indexOf('SSV')>=0&&records.some(function(r){return r.ssv!==''&&r.ssv!==undefined;}))addS('SSV (0-100)',records.map(function(r){return r.ssv!==''&&r.ssv!==undefined?Number(r.ssv):null;}),'#185fa5');
  if(q.indexOf('OSS')>=0&&records.some(function(r){return r.oss!==''&&r.oss!==undefined;}))addS('OSS (0-48)',records.map(function(r){return r.oss!==''&&r.oss!==undefined?Number(r.oss):null;}),'#3b6d11');
  if(q.indexOf('QuickDASH')>=0&&records.some(function(r){return r.quickdash!==''&&r.quickdash!==undefined;}))addS('QuickDASH',records.map(function(r){return r.quickdash!==''&&r.quickdash!==undefined?Number(r.quickdash):null;}),'#854f0b',true);
  if(q.indexOf('OES')>=0&&records.some(function(r){return r.oes_total!==''&&r.oes_total!==undefined;}))addS('OES (0-100)',records.map(function(r){return r.oes_total!==''&&r.oes_total!==undefined?Number(r.oes_total):null;}),'#534ab7');
  if(q.indexOf('WOMAC')>=0&&records.some(function(r){return r.womac_pct!==''&&r.womac_pct!==undefined;}))addS('WOMAC %',records.map(function(r){return r.womac_pct!==''&&r.womac_pct!==undefined?Number(r.womac_pct):null;}),'#993c1d',true);
  if(q.indexOf('KOOS')>=0&&records.some(function(r){return r.koos_total!==''&&r.koos_total!==undefined;}))addS('KOOS (0-100)',records.map(function(r){return r.koos_total!==''&&r.koos_total!==undefined?Number(r.koos_total):null;}),'#0f6e56');
  if(!series.length){cont.innerHTML='<div class="empty">Nessun punteggio disponibile</div>';return;}
  var tdiv=mk('div','');tdiv.style.overflowX='auto';
  var table=document.createElement('table');table.className='tt';
  var thead=document.createElement('thead'),tr=document.createElement('tr');
  var th0=document.createElement('th');th0.textContent='Scala';tr.appendChild(th0);
  timings.forEach(function(t){var th=document.createElement('th');th.textContent=t;th.style.textAlign='right';tr.appendChild(th);});
  var thD=document.createElement('th');thD.textContent='Delta';thD.style.textAlign='right';tr.appendChild(thD);
  thead.appendChild(tr);table.appendChild(thead);
  var tbody=document.createElement('tbody');
  series.forEach(function(s){
    var row=document.createElement('tr');
    var td0=document.createElement('td');td0.textContent=s.label;td0.style.fontWeight='500';td0.style.whiteSpace='nowrap';row.appendChild(td0);
    var first=null,last=null;
    s.data.forEach(function(v){var td=document.createElement('td');td.className='td-r';td.textContent=v!==null?v.toFixed(1):'-';if(v!==null&&first===null)first=v;if(v!==null)last=v;row.appendChild(td);});
    var delta=(first!==null&&last!==null)?last-first:null;
    var good=delta===null?null:(s.inverted?delta<0:delta>0);
    var tdD=document.createElement('td');tdD.className=delta===null?'td-r':good?'td-pos':'td-neg';
    tdD.textContent=delta===null?'-':(delta>0?'+':'')+delta.toFixed(1);row.appendChild(tdD);tbody.appendChild(row);
  });
  table.appendChild(tbody);tdiv.appendChild(table);
  if(trendChart){trendChart.destroy();trendChart=null;}
  cont.innerHTML='';cont.appendChild(tdiv);
  var cw=mk('div','chart-wrap');var canvas=document.createElement('canvas');canvas.id='trend-canvas';cw.appendChild(canvas);cont.appendChild(cw);
  trendChart=new Chart(canvas,{type:'line',data:{labels:timings,datasets:series.map(function(s){return{label:s.label,data:s.data,borderColor:s.color,backgroundColor:s.color+'22',borderWidth:2.5,pointRadius:5,pointBackgroundColor:s.color,tension:.3,spanGaps:true};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:12,padding:10}}},scales:{x:{grid:{color:'rgba(128,128,128,.1)'},ticks:{font:{size:11}}},y:{grid:{color:'rgba(128,128,128,.1)'},ticks:{font:{size:11}},beginAtZero:false}}}});
}

// ── BACKUP / RIPRISTINO ────────────────────────────────────
function backupJSON(){
  var blob=new Blob([JSON.stringify(allPatients,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='backup_tame_'+today()+'.json';a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},1000);
}
async function restoreJSON(input){
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var data=JSON.parse(e.target.result);
      if(!Array.isArray(data))throw new Error('Formato non valido');
      var ex=allPatients.map(function(p){return p.id;});
      var newPts=data.filter(function(p){return ex.indexOf(p.id)<0;});
      if(!newPts.length){alert('Nessun record nuovo da importare.');return;}
      if(!confirm('Importare '+newPts.length+' record?'))return;
      setSS('spin','importazione...');
      for(var i=0;i<newPts.length;i++){await gsWrite(newPts[i]);allPatients.push(normalizeRecord(newPts[i]));}
      updateCnt(allPatients.length);setSS('ok',allPatients.length+' record');renderList();alert(newPts.length+' record importati.');
    }catch(err){alert('Errore: '+err.message);}input.value='';
  };reader.readAsText(file);
}

    'OSS (0-48)':p.oss!==''&&p.oss!==undefined?p.oss:'',

function buildXLSX(sheets){
  var sn=Object.keys(sheets);
  var ex=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');};
  var st=[],sm={};
  var si=function(s){var k=String(s);if(sm[k]===undefined){sm[k]=st.length;st.push(k);}return sm[k];};
  var col=function(i){var s='';i++;while(i>0){s=String.fromCharCode(64+(i%26||26))+s;i=Math.floor((i-1)/26);}return s;};
  var ws=function(rows){if(!rows.length)return'<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData/></worksheet>';var cols=Object.keys(rows[0]);var x='<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>';x+='<row r="1">'+cols.map(function(c,ci){return'<c r="'+col(ci)+'1" t="s"><v>'+si(c)+'</v></c>';}).join('')+'</row>';rows.forEach(function(row,ri){x+='<row r="'+(ri+2)+'">'+cols.map(function(c,ci){var v=row[c];if(v===''||v===null||v===undefined)return'<c r="'+col(ci)+(ri+2)+'"/>';if(typeof v==='number')return'<c r="'+col(ci)+(ri+2)+'"><v>'+v+'</v></c>';return'<c r="'+col(ci)+(ri+2)+'" t="s"><v>'+si(String(v))+'</v></c>';}).join('')+'</row>';});x+='</sheetData></worksheet>';return x;};
  var wxml=sn.map(function(n){return ws(sheets[n]);});
  var ss='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="'+st.length+'" uniqueCount="'+st.length+'">'+st.map(function(s){return'<si><t xml:space="preserve">'+ex(s)+'</t></si>';}).join('')+'</sst>';
  var wb='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+sn.map(function(n,i){return'<sheet name="'+ex(n)+'" sheetId="'+(i+1)+'" r:id="rId'+(i+2)+'"/>';}).join('')+'</sheets></workbook>';
  var wr='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/sharedStrings" Target="sharedStrings.xml"/>'+sn.map(function(n,i){return'<Relationship Id="rId'+(i+2)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>';}).join('')+'</Relationships>';
  var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+sn.map(function(_,i){return'<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';}).join('')+'<Override PartName="/xl/sharedStrings.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sharedStrings+xml"/></Types>';
  var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>';
  var files={'[Content_Types].xml':ct,'_rels/.rels':rels,'xl/workbook.xml':wb,'xl/_rels/workbook.xml.rels':wr,'xl/sharedStrings.xml':ss};
  sn.forEach(function(n,i){files['xl/worksheets/sheet'+(i+1)+'.xml']=wxml[i];});
  return makeZip(files);
}
function makeZip(files){
  var entries=[],off=0;
  var enc=function(s){var b=[];for(var i=0;i<s.length;i++){var c=s.charCodeAt(i);if(c<128)b.push(c);else if(c<2048)b.push(192|(c>>6),128|(c&63));else b.push(224|(c>>12),128|((c>>6)&63),128|(c&63));}return new Uint8Array(b);};
  var u32=function(n){return[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];};
  var u16=function(n){return[n&0xFF,(n>>8)&0xFF];};
  var crc32=function(data){var c=0xFFFFFFFF,t=new Uint32Array(256);for(var i=0;i<256;i++){var v=i;for(var j=0;j<8;j++)v=v&1?(v>>>1)^0xEDB88320:(v>>>1);t[i]=v;}for(var i=0;i<data.length;i++)c=t[(c^data[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;};
  var lhs=[];
  Object.keys(files).forEach(function(name){var nb=enc(name),db=enc(files[name]),crc=crc32(db),sz=db.length,lh=[0x50,0x4B,0x03,0x04,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00].concat(u32(crc)).concat(u32(sz)).concat(u32(sz)).concat(u16(nb.length)).concat([0x00,0x00]).concat(Array.from(nb)).concat(Array.from(db));lhs.push({off:off,lh:lh,nb:nb,crc:crc,sz:sz});off+=lh.length;entries.push(lh);});
  lhs.forEach(function(h){entries.push([0x50,0x4B,0x01,0x02,0x14,0x00,0x14,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00].concat(u32(h.crc)).concat(u32(h.sz)).concat(u32(h.sz)).concat(u16(h.nb.length)).concat([0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00,0x00]).concat(u32(h.off)).concat(Array.from(h.nb)));});
  var cdSz=entries.slice(lhs.length).reduce(function(a,b){return a+b.length;},0);
  entries.push([0x50,0x4B,0x05,0x06,0x00,0x00,0x00,0x00].concat(u16(lhs.length)).concat(u16(lhs.length)).concat(u32(cdSz)).concat(u32(off)).concat([0x00,0x00]));
  var total=entries.reduce(function(a,b){return a+b.length;},0),buf=new Uint8Array(total),pos=0;
  entries.forEach(function(e){buf.set(new Uint8Array(e),pos);pos+=e.length;});return buf;
}
